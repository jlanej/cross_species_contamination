# Cross-Species Contamination Detection Pipeline – Default Configuration
#
# This file contains default settings for all pipeline modules.
# Override values by providing a custom YAML config file via the
# CSC_CONFIG environment variable or --config CLI flag.

extract:
  mapq_threshold: null       # null = only unmapped (flag 4); integer = also low-MAPQ
  threads: 1                 # samtools decompression threads
  interleaved: false         # true = single interleaved FASTQ; false = split R1/R2
  output_suffix: ".unmapped" # suffix inserted before .fastq.gz in output names

classify:
  tool: "kraken2"            # taxonomic classifier to use
  db: null                   # path to classifier database (see recommended_db below)
  confidence: 0.0            # minimum confidence threshold
  threads: 1
  memory_mapping: false      # use memory mapping instead of loading DB into RAM
  db_cache: null             # cache directory for downloaded DBs (default: ~/.csc/db)
  # PrackenDB is recommended: one genome per species (bacteria, archaea, fungi,
  # protists, viruses, human, UniVec Core).  This avoids inflated LCA
  # assignments from redundant genomes and enables robust species-level
  # detection.  Fetch with: csc-db fetch prackendb
  recommended_db: "prackendb"

aggregate:
  min_reads: 10              # minimum reads to include a taxon in aggregation
  rank_filter:               # taxonomy ranks for per-rank matrices (default: S, G, F)
    - "S"                    # species
    - "G"                    # genus
    - "F"                    # family

detect:
  method: "mad"              # outlier detection method: "mad" or "iqr"
  mad_threshold: 3.5         # scaled-MAD units above median to flag (MAD method)
  iqr_multiplier: 1.5        # IQR fence multiplier (IQR method)
  subtract_background: true  # subtract population-mean per taxon before testing
  kitome_taxa: []            # NCBI taxonomy IDs for known kitome/environmental taxa

logging:
  level: "INFO"              # default log level (DEBUG, INFO, WARNING, ERROR)
